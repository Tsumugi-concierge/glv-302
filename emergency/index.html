<style>
  :root{--accent:#c03840;--accent-light:#f0c0c0;--cream:#f4f7fa;--text-dark:#2c3440;--text-mid:#566374;}
  .lang-bar{display:flex;justify-content:center;gap:6px;padding:10px 16px;flex-wrap:wrap;background:var(--cream);}
  .lang-btn{border:2px solid var(--accent-light);background:rgba(255,255,255,0.92);border-radius:50px;padding:4px 9px;font-family:'Nunito',sans-serif;font-size:0.72rem;font-weight:800;color:var(--text-mid);cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(60,80,120,0.12);}
  .lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .lang-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}
  .info-card{background:#fff;border-left:4px solid var(--accent);border-radius:12px;padding:16px 18px;margin:16px 0;box-shadow:0 2px 10px rgba(60,80,120,0.10);}
  .info-card p{font-size:0.92rem;line-height:1.75;color:var(--text-mid);margin:0;}
  .info-card p+p{margin-top:8px;}
  .section-title{font-family:'Pacifico',cursive;font-size:1rem;color:var(--accent);margin-bottom:8px;}
  .rest-card{background:#fff;border-radius:14px;padding:14px 16px;margin:12px 0;box-shadow:0 2px 10px rgba(60,80,120,0.10);}
  .rest-card .rest-name{font-weight:800;font-size:0.97rem;color:var(--text-dark);margin-bottom:4px;}
  .rest-card .rest-desc{font-size:0.88rem;color:var(--text-mid);line-height:1.6;margin-bottom:6px;}
  .rest-card a{display:inline-flex;align-items:center;gap:5px;font-size:0.82rem;font-weight:700;color:var(--accent);text-decoration:none;}
  .rest-card a:hover{opacity:0.75;}
  .notice-card{background:#fff;border:3px solid var(--accent);border-radius:16px;padding:28px 24px;text-align:center;box-shadow:0 4px 20px rgba(60,80,120,0.15);margin-bottom:24px;}
  .notice-icon{font-size:3.5rem;margin-bottom:16px;display:block;}
  .notice-title{font-family:'Pacifico',cursive;font-size:1.2rem;color:var(--accent);margin-bottom:16px;}
  .notice-body{font-size:0.95rem;line-height:1.8;color:var(--text-mid);}
  .notice-body strong{color:var(--accent);display:block;margin-top:12px;font-size:1rem;}
  .page-img{width:100%;border-radius:12px;margin:12px 0;box-shadow:0 2px 12px rgba(60,80,120,0.12);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;}
  .top-bar{background:linear-gradient(135deg,var(--accent) 0%,color-mix(in srgb,var(--accent) 70%,black) 100%);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
  .back-btn{background:rgba(255,255,255,0.25);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;color:#fff;text-decoration:none;flex-shrink:0;transition:background 0.2s;}
  .back-btn:hover{background:rgba(255,255,255,0.4);}
  .top-title{font-family:'Pacifico',cursive;font-size:1.3rem;color:#fff;text-shadow:1px 2px 4px rgba(0,0,0,0.2);flex:1;}
  .top-emoji{font-size:1.8rem;}
  .content{padding:20px 16px 40px;max-width:640px;margin:0 auto;}
  .back-footer{text-align:center;margin-top:28px;padding-bottom:20px;}
  .back-footer a{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;text-decoration:none;padding:12px 28px;border-radius:50px;font-weight:800;font-size:0.9rem;transition:opacity 0.2s;}
  .back-footer a:hover{opacity:0.8;}
</style>
</head>
